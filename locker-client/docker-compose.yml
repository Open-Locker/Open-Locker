services:
  locker-client:
    image: ghcr.io/open-locker/locker-client:${LOCKER_CLIENT_IMAGE_TAG:-latest}
    container_name: locker-client
    labels:
      - com.centurylinklabs.watchtower.enable=true

    # Map the Modbus serial device
    devices:
      - /dev/ttyACM0:/dev/ttyACM0

    # Mount configuration and data volumes
    volumes:
      # Configuration volume (read-write)
      # Contains locker-config.yml
      - ./config:/config

      # Data volume (read-write)
      # Stores persistent data: .mqtt-client-id, .mqtt-credentials.json, .provisioning-state
      - ./data:/data

    # Environment variables
    environment:
      # Optional: Override default paths
      # - CONFIG_DIR=/config
      # - DATA_DIR=/data

      # Please set the PROVISIONING_TOKEN environment variable before starting the container
      PROVISIONING_TOKEN: ${PROVISIONING_TOKEN}

    # Restart policy
    restart: unless-stopped

    # Optional: Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: locker-client-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TZ:-UTC}
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
