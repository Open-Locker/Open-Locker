services:
  locker-client:
    image: ghcr.io/open-locker/locker-client:${LOCKER_CLIENT_IMAGE_TAG:-latest}
    container_name: locker-client
    labels:
      - com.centurylinklabs.watchtower.enable=true

    # Map the Modbus serial device
    devices:
      - /dev/ttyACM0:/dev/ttyACM0

    # Mount operator configuration and persistent runtime data
    volumes:
      # Base configuration is operator-managed and immutable at runtime.
      - ./config:/config:ro

      # Stores client identity, MQTT credentials, runtime overlay, and dedup state.
      - ./data:/data

    # Load deployment environment variables
    env_file:
      - .env

    # Restart policy
    restart: unless-stopped

    # Optional: Logging configuration
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  watchtower:
    image: containrrr/watchtower:latest
    container_name: locker-client-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TZ:-UTC}
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.44}
      WATCHTOWER_LABEL_ENABLE: 'true'
      WATCHTOWER_CLEANUP: 'true'
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
