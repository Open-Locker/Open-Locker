asyncapi: 3.1.0
info:
  title: Open-Locker MQTT Contract
  version: 0.1.0-alpha
  description: >-
    Canonical MQTT contract for Open-Locker backend, locker-client, and
    provisioning clients.
servers:
  localBroker:
    host: localhost:1883
    protocol: mqtt
    description: Example local MQTT broker used for development.
channels:
  lockerCommand:
    address: locker/{locker_uuid}/command
    parameters:
      locker_uuid:
        $ref: '#/components/parameters/locker_uuid'
    messages:
      openCompartmentCommand:
        $ref: '#/components/messages/openCompartmentCommand'
      applyConfigCommand:
        $ref: '#/components/messages/applyConfigCommand'
  lockerResponse:
    address: locker/{locker_uuid}/response
    parameters:
      locker_uuid:
        $ref: '#/components/parameters/locker_uuid'
    messages:
      commandSuccessResponse:
        $ref: '#/components/messages/commandSuccessResponse'
      applyConfigSuccessResponse:
        $ref: '#/components/messages/applyConfigSuccessResponse'
      commandErrorResponse:
        $ref: '#/components/messages/commandErrorResponse'
  lockerEvent:
    address: locker/{locker_uuid}/event
    description: >-
      Non-retained spontaneous device events. No concrete runtime events are
      implemented in the current contract. Future candidates include
      `qr_scanned` and `tamper_detected`; current door state is reported through
      `locker/{locker_uuid}/state/compartments` instead.
    parameters:
      locker_uuid:
        $ref: '#/components/parameters/locker_uuid'
    messages:
      deviceEvent:
        $ref: '#/components/messages/deviceEvent'
  lockerStateHeartbeat:
    address: locker/{locker_uuid}/state/heartbeat
    parameters:
      locker_uuid:
        $ref: '#/components/parameters/locker_uuid'
    messages:
      heartbeatState:
        $ref: '#/components/messages/heartbeatState'
  lockerStateCompartments:
    address: locker/{locker_uuid}/state/compartments
    parameters:
      locker_uuid:
        $ref: '#/components/parameters/locker_uuid'
    messages:
      snapshotState:
        $ref: '#/components/messages/snapshotState'
  lockerStateConnection:
    address: locker/{locker_uuid}/state/connection
    parameters:
      locker_uuid:
        $ref: '#/components/parameters/locker_uuid'
    messages:
      connectionLostState:
        $ref: '#/components/messages/connectionLostState'
  provisioningRegister:
    address: locker/register/{provisioning_token}
    parameters:
      provisioning_token:
        $ref: '#/components/parameters/provisioning_token'
    messages:
      provisioningRequest:
        $ref: '#/components/messages/provisioningRequest'
  provisioningReply:
    address: locker/provisioning/reply/{client_id}
    parameters:
      client_id:
        $ref: '#/components/parameters/client_id'
    messages:
      provisioningSuccessReply:
        $ref: '#/components/messages/provisioningSuccessReply'
      provisioningErrorReply:
        $ref: '#/components/messages/provisioningErrorReply'
operations:
  backendSendLockerCommand:
    action: send
    channel:
      $ref: '#/channels/lockerCommand'
    summary: Backend publishes transaction-bound commands to one locker.
    messages:
      - $ref: '#/channels/lockerCommand/messages/openCompartmentCommand'
      - $ref: '#/channels/lockerCommand/messages/applyConfigCommand'
  backendReceiveLockerResponse:
    action: receive
    channel:
      $ref: '#/channels/lockerResponse'
    summary: Backend receives transaction-bound command responses.
    messages:
      - $ref: '#/channels/lockerResponse/messages/commandSuccessResponse'
      - $ref: '#/channels/lockerResponse/messages/applyConfigSuccessResponse'
      - $ref: '#/channels/lockerResponse/messages/commandErrorResponse'
  backendReceiveLockerEvent:
    action: receive
    channel:
      $ref: '#/channels/lockerEvent'
    summary: Backend receives spontaneous locker events.
    description: >-
      Placeholder operation for future non-retained events such as `qr_scanned`
      or `tamper_detected`.
    messages:
      - $ref: '#/channels/lockerEvent/messages/deviceEvent'
  backendReceiveLockerHeartbeat:
    action: receive
    channel:
      $ref: '#/channels/lockerStateHeartbeat'
    summary: Backend receives non-retained locker heartbeats.
    messages:
      - $ref: '#/channels/lockerStateHeartbeat/messages/heartbeatState'
  backendReceiveLockerCompartments:
    action: receive
    channel:
      $ref: '#/channels/lockerStateCompartments'
    summary: Backend receives retained compartment snapshots.
    description: >-
      Compartment snapshots are retained full snapshots of all configured
      compartments, not deltas.
    messages:
      - $ref: '#/channels/lockerStateCompartments/messages/snapshotState'
  backendReceiveLockerConnection:
    action: receive
    channel:
      $ref: '#/channels/lockerStateConnection'
    summary: Backend receives non-retained locker connection state signals.
    messages:
      - $ref: '#/channels/lockerStateConnection/messages/connectionLostState'
  provisioningClientSendRegisterRequest:
    action: send
    channel:
      $ref: '#/channels/provisioningRegister'
    summary: Provisioning client requests locker enrollment.
    messages:
      - $ref: '#/channels/provisioningRegister/messages/provisioningRequest'
  provisioningClientReceiveReply:
    action: receive
    channel:
      $ref: '#/channels/provisioningReply'
    summary: Provisioning client receives enrollment result.
    messages:
      - $ref: '#/channels/provisioningReply/messages/provisioningSuccessReply'
      - $ref: '#/channels/provisioningReply/messages/provisioningErrorReply'
  lockerClientReceiveLockerCommand:
    action: receive
    channel:
      $ref: '#/channels/lockerCommand'
    summary: Locker-client receives backend commands.
    messages:
      - $ref: '#/channels/lockerCommand/messages/openCompartmentCommand'
      - $ref: '#/channels/lockerCommand/messages/applyConfigCommand'
  lockerClientSendLockerResponse:
    action: send
    channel:
      $ref: '#/channels/lockerResponse'
    summary: Locker-client sends transaction-bound command responses.
    messages:
      - $ref: '#/channels/lockerResponse/messages/commandSuccessResponse'
      - $ref: '#/channels/lockerResponse/messages/applyConfigSuccessResponse'
      - $ref: '#/channels/lockerResponse/messages/commandErrorResponse'
  lockerClientSendLockerEvent:
    action: send
    channel:
      $ref: '#/channels/lockerEvent'
    summary: Locker-client sends spontaneous device events.
    description: >-
      Reserved for future non-retained events. Do not use this topic for current
      compartment door state; publish retained state on `state/compartments`.
    messages:
      - $ref: '#/channels/lockerEvent/messages/deviceEvent'
  lockerClientSendLockerHeartbeat:
    action: send
    channel:
      $ref: '#/channels/lockerStateHeartbeat'
    summary: Locker-client sends non-retained heartbeats.
    description: Publish heartbeats with MQTT retain=false.
    messages:
      - $ref: '#/channels/lockerStateHeartbeat/messages/heartbeatState'
  lockerClientSendLockerCompartments:
    action: send
    channel:
      $ref: '#/channels/lockerStateCompartments'
    summary: Locker-client sends retained compartment snapshots.
    description: >-
      Publish with MQTT retain=true. This is a full snapshot of all configured
      compartments, not a delta. The locker-client publishes it after the first
      successful state poll and afterwards only when at least one effective
      compartment `door_state` changes. If a configured compartment cannot be
      read reliably, report it as `door_state=unknown`.
    messages:
      - $ref: '#/channels/lockerStateCompartments/messages/snapshotState'
  lockerClientSendLockerConnection:
    action: send
    channel:
      $ref: '#/channels/lockerStateConnection'
    summary: Locker-client sends non-retained connection state signals.
    description: Publish LWT connection state with MQTT retain=false.
    messages:
      - $ref: '#/channels/lockerStateConnection/messages/connectionLostState'
components:
  parameters:
    locker_uuid:
      description: Stable locker UUID used as the MQTT namespace for one locker.
      schema:
        type: string
        minLength: 1
    provisioning_token:
      description: One-time provisioning token for pre-provisioned locker enrollment.
      schema:
        type: string
        minLength: 1
    client_id:
      description: Temporary provisioning client identifier used for reply isolation.
      schema:
        type: string
        minLength: 1
  messages:
    openCompartmentCommand:
      name: openCompartmentCommand
      title: Open compartment command
      contentType: application/json
      payload:
        $ref: './schemas/payloads/command-open-compartment.json'
    applyConfigCommand:
      name: applyConfigCommand
      title: Apply runtime configuration command
      contentType: application/json
      payload:
        $ref: './schemas/payloads/command-apply-config.json'
    commandSuccessResponse:
      name: commandSuccessResponse
      title: Successful command response
      contentType: application/json
      payload:
        $ref: './schemas/payloads/response-command-success.json'
    applyConfigSuccessResponse:
      name: applyConfigSuccessResponse
      title: Successful apply_config response
      contentType: application/json
      payload:
        $ref: './schemas/payloads/response-apply-config-success.json'
    commandErrorResponse:
      name: commandErrorResponse
      title: Failed command response
      contentType: application/json
      payload:
        $ref: './schemas/payloads/response-command-error.json'
    deviceEvent:
      name: deviceEvent
      title: Generic non-retained device event
      contentType: application/json
      payload:
        $ref: './schemas/messages/event.json'
    heartbeatState:
      name: heartbeatState
      title: Periodic heartbeat state
      contentType: application/json
      payload:
        $ref: './schemas/payloads/state-heartbeat.json'
    snapshotState:
      name: snapshotState
      title: Aggregated retained compartment snapshot
      contentType: application/json
      payload:
        $ref: './schemas/payloads/state-snapshot.json'
    connectionLostState:
      name: connectionLostState
      title: LWT connection lost state
      contentType: application/json
      payload:
        $ref: './schemas/payloads/state-connection-lost.json'
    provisioningRequest:
      name: provisioningRequest
      title: Provisioning registration request
      contentType: application/json
      payload:
        $ref: './schemas/messages/provisioning-request.json'
    provisioningSuccessReply:
      name: provisioningSuccessReply
      title: Successful provisioning reply
      contentType: application/json
      payload:
        $ref: './schemas/payloads/provisioning-success.json'
    provisioningErrorReply:
      name: provisioningErrorReply
      title: Failed provisioning reply
      contentType: application/json
      payload:
        $ref: './schemas/payloads/provisioning-error.json'
