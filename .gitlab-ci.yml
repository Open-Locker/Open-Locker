workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - when: never

stages:
  - build
  - release
  - deploy

default:
  image: docker:24.0.5-cli
  services:
    - name: docker:24.0.5-dind
      alias: docker
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin

variables:
  # TLS-enabled Docker-in-Docker:
  # https://docs.gitlab.com/ci/docker/using_docker_build/#tls-enabled
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"

  IMAGE_TEST: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  IMAGE_BRANCH: "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"

build-image:
  stage: build
  script:
    - docker build --pull -t "$IMAGE_TEST" -t "$IMAGE_BRANCH" .
    - docker push "$IMAGE_TEST"
    - docker push "$IMAGE_BRANCH"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

release-latest:
  stage: release
  script:
    - docker pull "$IMAGE_TEST"
    - docker tag "$IMAGE_TEST" "$IMAGE_LATEST"
    - docker push "$IMAGE_LATEST"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  image: curlimages/curl:latest
  script:
    - >
      curl --fail --show-error --silent
      --request GET "$COOLIFY_WEBHOOK"
      --header "Authorization: Bearer $COOLIFY_TOKEN"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: false

