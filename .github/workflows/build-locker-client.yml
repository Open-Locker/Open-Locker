name: Build Locker Client

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'locker-client/**'
      - '.github/workflows/build-locker-client.yml'
  push:
    branches:
      - main
      - dev
    tags:
      - 'locker-client-v*'
    paths:
      - 'locker-client/**'
      - '.github/workflows/build-locker-client.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/locker-client-v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/locker-client-v')
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/locker-client
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=match,pattern=locker-client-v(.*),group=1
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify)
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@v5
        with:
          context: ./locker-client
          file: ./locker-client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./locker-client
          file: ./locker-client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image (release tag)
        if: startsWith(github.ref, 'refs/tags/locker-client-v')
        uses: docker/build-push-action@v5
        with:
          context: ./locker-client
          file: ./locker-client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
